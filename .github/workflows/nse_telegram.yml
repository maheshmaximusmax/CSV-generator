name: NSE CSV to Telegram

on:
  schedule:
    # Default fallback: 04:00 UTC = 09:30 IST, Mon-Fri
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  send_csv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Editable from GitHub UI (Settings > Secrets and variables > Actions > Variables)
      # Example: 0 4 * * 1-5
      SCHEDULE_CRON: ${{ vars.SCHEDULE_CRON }}
      TZ_NAME: ${{ vars.TZ_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Print active schedule info
        run: |
          echo "SCHEDULE_CRON=${SCHEDULE_CRON}"
          echo "TZ_NAME=${TZ_NAME}"

      - name: Run bot
        run: python nse_to_telegram.py
