name: NSE CSV to Telegram

on:
  schedule:
    # 04:00 UTC = 09:30 IST (Mon-Fri)
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  nse-csv-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE CSV sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_SUCCESS_TEXT: "false"
        run: python nse_to_telegram.py
